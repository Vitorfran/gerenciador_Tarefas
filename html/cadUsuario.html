<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuarios</title>
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/cadUsuario.css">
    <link rel="shortcut icon" href="/img/favicon_io (1)/favicon.ico" type="image/x-icon">
</head>
<body>
    <header class="cabeçalho"> 
        <h1 class=""><a class="textoPrincipal"  href="../index.html">Gerenciador de Tarefas </a></h1> <!-- cabeçalho -->
         <nav>
             <ul class="lista">
                 <li> <a  class="links" href="cadUsuario.html">Cadastro de Usuario</a>
                 </li>
                 <li>  <a class="links" href="cadTarefa.html">Cadastro de Tarefas</a>
                 </li>
                <li > <a class="links" href="gerenciador.html">Gerenciar Tarefas </a>
                </li>
             </ul>
            </nav>
        </header>
        <main>  <!-- Conteudo -->
        <section> <!-- Sessao 1-->
             <h1>Cadastrar Usuario</h1>
             
             <div class="menucadUser">
                
                <form method="post">
                    <p class="textoCad">Email:</p>
                    <input class="input" type="email" name="" id="email" placeholder="Digite seu Email">

                    <p class="textoCad">Usuario</p>
                    <input class="input" type="text" id="usuario" placeholder="Digite seu Usuario">

                    <p class="textoCad">Senha: </p>
                    <input class="input" type="password" name="" id="senha" placeholder="Digite sua Senha">

                    <p class="textoCad">Confirmar Senha: </p>
                    <input class="input" type="password" name="" id="confirmarsenha" placeholder="Confirme sua Senha">

                    <button onclick="" class="enviar" type="submit">Enviar</button>


                </form>

             </div>
        </section>

        <section> <!-- Sessao 2 -->
            <h1></h1>
            <p></p>
        </section>
    </main>
    
    <footer> <!-- Rodapé -->
       
        <p class="textofooter" >&copy; Todos os Direitos Reservados</p>
</body>
