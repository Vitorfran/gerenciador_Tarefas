<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/cadUsuario.css">
    <link rel="shortcut icon" href="/img/favicon_io (1)/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
          <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-dark text-decoration-none">
            <svg class="bi me-2" width="40" height="32"><use xlink:href="#bootstrap"></use></svg>
            <span class="fs-4">Gerenciador de Tarefas</span>
          </a>
    
          <ul class="nav nav-pills">
            <li class="nav-item"><a href="/index.html" class="nav-link" aria-current="page">Home</a></li>
            <li class="nav-item"><a href="/html/cadUsuario.html" class="nav-link active" aria-current="page">Cadastrar Usuario</a></li>
            <li class="nav-item"><a href="/html/cadTarefa.html" class="nav-link">Cadastrar Tarefas</a></li>
            <li class="nav-item"><a href="/html/gerenciador.html" class="nav-link">Gerenciador de Tarefas</a></li>
          </ul>
        </header>
    </div>
        <main>  <!-- Conteudo -->
        <section> <!-- Sessao 1-->
             <h2>Cadastrar Usuario</h2>
             
             <div class="menucadUser">
                
                <form method="post">
                    <p class="textoCad">Email</p>
                    <input class="input" type="email" name="" id="email" placeholder="Digite seu Email">

                    <p class="textoCad">Usuario</p>
                    <input class="input" type="text" id="usuario" placeholder="Digite seu Usuario">

                    <p class="textoCad">Senha </p>
                    <input class="input" type="password" name="" id="senha" placeholder="Digite sua Senha">

                    <p class="textoCad">Confirmar Senha </p>
                    <input class="input" type="password" name="" id="confirmarsenha" placeholder="Confirme sua Senha">

                    <button onclick="" class="enviar" type="submit">Enviar</button>


                </form>

             </div>
        </section>

        <section> <!-- Sessao 2 -->
            <h1></h1>
            <p></p>
        </section>
    </main>
    
    <footer> <!-- Rodapé -->
       
        <p class="textofooter" >&copy; Todos os Direitos Reservados</p>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
