            <section> <!-- Sessao 1-->
                 <h2 class="textocadPrincial" >Cadastrar Tarefas </h>
                 <div class="menucadTarefa">
                
                    <form action="post">
                        <p class="textoCad"> Nome Para a Tarefa</p>
                        <input class="input" type="text" name="" id="nomeTarefa"placeholder="Digite o nome Para a Tarefa">

                        <p class="textoCad"> Usuario</p>
                        <input class="input" type="text" id="usuario" placeholder="Digite seu Usuario">
    
                        <p class="textoCad">Dia</p>
                       <input class="input" type="date" name="" id="data">
    
                        <p class="textoCad">Horario </p>
                        <input  class="input" type="time" name="" id="horario" placeholder="">
    
                        <button class="enviar" type="submit">Enviar</button>
    
    
                    </form>
    
                 </div>
